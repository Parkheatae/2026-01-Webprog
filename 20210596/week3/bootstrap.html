<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부트스트랩 반응형 웹 페이지 예제</title>
    <!-- Bootstrap CSS CDN 링크: 부트스트랩의 스타일링을 적용하기 위한 최신 CSS 파일 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <!-- 네비게이션 바: 웹사이트의 상단 메뉴로, 반응형으로 축소될 수 있음 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- 네비게이션 바 브랜드: 로고나 사이트 이름 -->
            <a class="navbar-brand" href="#">블로그 대시보드</a>
            <!-- 네비게이션 토글 버튼: 작은 화면에서 메뉴를 토글하기 위한 버튼 -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- 네비게이션 메뉴: 링크 목록 -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">홈</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">블로그</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">대시보드</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 메인 컨테이너: 페이지의 주요 콘텐츠를 감싸는 컨테이너로, 최대 너비를 제한 -->
    <div class="container mt-4">
        <!-- 헤더 섹션: 페이지 제목 -->
        <div class="row">
            <div class="col-12">
                <h1 class="text-center">부트스트랩 반응형 블로그/대시보드 예제</h1>
                <p class="text-center">브라우저 창 크기를 조절하여 반응형 레이아웃을 확인하세요.</p>
            </div>
        </div>

        <!-- 그리드 시스템: 행(row)과 열(col)을 사용하여 콘텐츠를 배치 -->
        <div class="row mt-4">
            <!-- 사이드바: 작은 화면에서는 숨겨지고, 중간 화면 이상에서 표시 -->
            <div class="col-md-3 d-none d-md-block">
                <div class="card">
                    <div class="card-header">
                        사이드바
                    </div>
                    <div class="card-body">
                        <p>대시보드 메뉴</p>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">통계</li>
                            <li class="list-group-item">설정</li>
                            <li class="list-group-item">프로필</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 메인 콘텐츠: 카드와 폼을 포함 -->
            <div class="col-md-9">
                <!-- 카드: 콘텐츠를 카드 형태로 표시 -->
                <div class="card mb-4">
                    <div class="card-header">
                        블로그 포스트
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">첫 번째 포스트</h5>
                        <p class="card-text">이것은 부트스트랩을 사용한 반응형 웹 페이지의 예제입니다. 카드 컴포넌트를 사용하여 콘텐츠를 구조화합니다.</p>
                        <!-- 버튼: 사용자 상호작용을 위한 버튼 -->
                        <a href="#" class="btn btn-primary">더 읽기</a>
                    </div>
                </div>

                <!-- 또 다른 카드 -->
                <div class="card mb-4">
                    <div class="card-header">
                        대시보드 위젯
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">통계 요약</h5>
                        <p class="card-text">방문자 수: 1,234 | 페이지뷰: 5,678</p>
                        <button class="btn btn-success">새로고침</button>
                    </div>
                </div>

                <!-- 폼: 사용자 입력을 위한 폼 -->
                <div class="card">
                    <div class="card-header">
                        연락처 폼
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="name" class="form-label">이름</label>
                                <!-- 폼 컨트롤: 입력 필드 -->
                                <input type="text" class="form-control" id="name" placeholder="이름을 입력하세요">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">이메일</label>
                                <input type="email" class="form-control" id="email" placeholder="이메일을 입력하세요">
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">메시지</label>
                                <!-- 텍스트 영역: 긴 텍스트 입력 -->
                                <textarea class="form-control" id="message" rows="3" placeholder="메시지를 입력하세요"></textarea>
                            </div>
                            <!-- 버튼 그룹: 여러 버튼을 그룹화 -->
                            <button type="submit" class="btn btn-primary">제출</button>
                            <button type="reset" class="btn btn-secondary ms-2">초기화</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS CDN 링크: 부트스트랩의 JavaScript 기능을 활성화 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
