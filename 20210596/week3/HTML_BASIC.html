<!DOCTYPE html>
<html><!-- HTML 문서의 루트 요소 -->
<head><!-- 문서의 메타데이터를 포함 -->
    <title>HTML Practice</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        div { border: 1px solid blue; padding: 10px; margin: 10px 0; background-color: #f0f8ff; }
        span { border: 1px solid green; padding: 5px; background-color: #f0fff0; }
        table { border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        ul, ol { margin: 10px 0; padding-left: 20px; }
        li { margin: 5px 0; }
        a { color: blue; text-decoration: underline; }
        img { border: 1px solid gray; padding: 5px; }
    </style>
</head>
<body><!-- 문서의 본문 내용 -->
    <h1>제목 1</h1><!-- 가장 큰 제목 레벨 -->
    <h2>제목 2</h2><!-- 두 번째 레벨 제목 -->
    <h3>제목 3</h3><!-- 세 번째 레벨 제목 -->
    <h4>제목 4</h4><!-- 네 번째 레벨 제목 -->
    <h5>제목 5</h5><!-- 다섯 번째 레벨 제목 -->
    <h6>제목 6</h6><!-- 가장 작은 제목 레벨 -->
    
    <p>이것은 단락입니다.</p><!-- 단락을 정의 -->
    
    <div>이것은 블록 컨테이너입니다.</div><!-- 블록 레벨 컨테이너 -->
    
    <p>이 문장에서 <span>이 부분</span>은 인라인 컨테이너입니다.</p><!-- 인라인 컨테이너 -->
    
    <ul><!-- 순서 없는 목록 -->
        <li>항목 1</li><!-- 목록 항목 -->
        <li>항목 2</li><!-- 목록 항목 -->
    </ul>
    
    <ol><!-- 순서 있는 목록 -->
        <li>첫 번째 항목</li><!-- 목록 항목 -->
        <li>두 번째 항목</li><!-- 목록 항목 -->
    </ol>
    
    <a href="#">링크 예시</a><!-- 하이퍼링크 -->
    
    <img src="https://fronty.com/static/uploads/seo/img.png"
    <table><!-- 테이블 정의 -->
        <tr><!-- 테이블 행 -->
            <th>헤더 1</th><!-- 테이블 헤더 셀 -->
            <th>헤더 2</th><!-- 테이블 헤더 셀 -->
        </tr>
        <tr><!-- 테이블 행 -->
            <td>데이터 1</td><!-- 테이블 데이터 셀 -->
            <td>데이터 2</td><!-- 테이블 이터 셀 -->
        </tr>
    </table>
</body>
</html>
