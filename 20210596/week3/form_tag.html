<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HTML 폼 태그 예제</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 600px; margin: 0 auto; }
        fieldset { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        legend { font-weight: bold; }
        label { display: block; margin: 10px 0 5px; }
        input, select, textarea, button { margin-bottom: 10px; padding: 5px; }
        .inline { display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>
    <h1>HTML 폼 태그 및 입력 타입 예제</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>기본 텍스트 입력</legend>
            <label for="text">Text Input (텍스트 입력)</label>
            <input type="text" id="text" name="text" placeholder="텍스트를 입력하세요">
            
            <label for="password">Password Input (비밀번호 입력)</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
            
            <label for="email">Email Input (이메일 입력)</label>
            <input type="email" id="email" name="email" placeholder="이메일을 입력하세요">
            
            <label for="url">URL Input (URL 입력)</label>
            <input type="url" id="url" name="url" placeholder="URL을 입력하세요">
            
            <label for="tel">Tel Input (전화번호 입력)</label>
            <input type="tel" id="tel" name="tel" placeholder="전화번호를 입력하세요">
        </fieldset>
        
        <fieldset>
            <legend>숫자 및 날짜 입력</legend>
            <label for="number">Number Input (숫자 입력)</label>
            <input type="number" id="number" name="number" min="0" max="100">
            
            <label for="range">Range Input (범위 슬라이더)</label>
            <input type="range" id="range" name="range" min="0" max="100">
            
            <label for="date">Date Input (날짜 선택)</label>
            <input type="date" id="date" name="date">
            
            <label for="time">Time Input (시간 선택)</label>
            <input type="time" id="time" name="time">
            
            <label for="datetime-local">Datetime-local Input (로컬 날짜시간)</label>
            <input type="datetime-local" id="datetime-local" name="datetime-local">
            
            <label for="month">Month Input (월 선택)</label>
            <input type="month" id="month" name="month">
            
            <label for="week">Week Input (주 선택)</label>
            <input type="week" id="week" name="week">
        </fieldset>
        
        <fieldset>
            <legend>선택 및 체크 입력</legend>
            <label>Checkbox Inputs (체크박스)</label>
            <label class="inline"><input type="checkbox" name="checkbox" value="option1"> 옵션 1</label>
            <label class="inline"><input type="checkbox" name="checkbox" value="option2"> 옵션 2</label>
            
            <label>Radio Inputs (라디오 버튼)</label>
            <label class="inline"><input type="radio" name="radio" value="option1"> 옵션 1</label>
            <label class="inline"><input type="radio" name="radio" value="option2"> 옵션 2</label>
            
            <label for="select">Select (드롭다운 선택)</label>
            <select id="select" name="select">
                <option value="">선택하세요</option>
                <option value="option1">옵션 1</option>
                <option value="option2">옵션 2</option>
            </select>
            
            <label for="color">Color Input (색상 선택)</label>
            <input type="color" id="color" name="color">
        </fieldset>
        
        <fieldset>
            <legend>기타 입력 및 버튼</legend>
            <label for="file">File Input (파일 업로드)</label>
            <input type="file" id="file" name="file">
            
            <label for="textarea">Textarea (긴 텍스트 입력)</label>
            <textarea id="textarea" name="textarea" rows="4" cols="50" placeholder="긴 텍스트를 입력하세요"></textarea>
            
            <label for="datalist-input">Datalist Input (자동완성)</label>
            <input type="text" id="datalist-input" name="datalist-input" list="datalist">
            <datalist id="datalist">
                <option value="옵션 1">
                <option value="옵션 2">
                <option value="옵션 3">
            </datalist>
            
            <input type="hidden" name="hidden" value="숨겨진 값">
            
            <button type="submit">Submit Button (제출 버튼)</button>
            <button type="reset">Reset Button (리셋 버튼)</button>
        </fieldset>
    </form>
</body>
</html>
