<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Example</title>
</head>
<body>
    <h1>JavaScript 변수 선언 예제</h1>
    <script>
        // 전역변수 선언
        var name = "홍길동";

        function displayInfo() {
            // 지역변수 선언
            let age = 25;
            const studentId = "20210001";

            // alert로 출력
            alert("이름: " + name);
            alert("나이: " + age);
            alert("학번: " + studentId);
        }

        // 함수 호출
        displayInfo();
    </script>
</body>
</html>
