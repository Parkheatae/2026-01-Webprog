<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>If and For Example</title>
</head>
<body>
    <h1>For 반복문과 If문 예제</h1>
    <div id="result"></div>
    <script>
        const resultDiv = document.getElementById('result');
        for (let i = 1; i <= 10; i++) {
            if (i % 2 === 0) {
                resultDiv.innerHTML += i + "는 짝수입니다.<br>";
            } else {
                resultDiv.innerHTML += i + "는 홀수입니다.<br>";
            }
        }
    </script>
</body>
</html>
